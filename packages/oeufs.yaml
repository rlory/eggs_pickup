script:
  oeufs_1:
    sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.oeufs_ramasses
        data:
          value: 1
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ramassage_des_oeufs
        data:
          date: "{{ now().date() }}"
      - service: browser_mod.close_popup

  oeufs_2:
    sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.oeufs_ramasses
        data:
          value: 2
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ramassage_des_oeufs
        data:
          date: "{{ now().date() }}"
      - service: browser_mod.close_popup

  # etc jusqu'à 10...

  oeufs_reset:
    sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.oeufs_ramasses
        data:
          value: 0
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ramassage_des_oeufs
        data:
          date: "{{ now().date() }}"
      - service: browser_mod.close_popup
